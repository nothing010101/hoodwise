<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoodwise — Coming Soon</title>
<link rel="icon" href="/hoodwise-mark.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #00e676;
    --primary-dim: #0a5c34;
    --bg: #060f0b;
    --bg-2: #0c1a12;
    --border: #1a2e1f;
    --text: #e8f5ee;
    --text-muted: #5a7a62;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }

  .brand { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 48px; }
  .brand-mark { width: 40px; height: 40px; filter: drop-shadow(0 0 12px rgba(0,230,118,0.4)); }
  .brand-name { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }

  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--primary);
    margin-bottom: 32px;
  }
  .badge i { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: pulse 1.8s ease-in-out infinite; display: inline-block; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  h1 { font-size: clamp(36px, 7vw, 64px); font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 20px; }
  h1 em { color: var(--primary); font-style: normal; }
  p { font-size: 16px; color: var(--text-muted); max-width: 420px; line-height: 1.6; margin-bottom: 40px; }

  .ca-block {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center;
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 20px; margin-bottom: 16px;
  }
  .ca-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .ca-address { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--primary); word-break: break-all; }

  .btn-buy {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--primary); color: #06150e;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px;
    border: none; border-radius: 10px; padding: 14px 32px;
    text-decoration: none; cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-buy:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-buy:active { transform: scale(0.98); }

  .back { margin-top: 48px; font-size: 13px; color: var(--text-muted); }
  .back a { color: var(--text-muted); text-decoration: none; border-bottom: 1px solid var(--border); transition: color 0.15s; }
  .back a:hover { color: var(--primary); }
</style>
</head>
<body>
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true">
      <rect width="100" height="100" rx="24" fill="url(#g1)"/>
      <path d="M28 68 L46 32 L58 52 L72 24" stroke="#06150e" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="100" y2="100">
        <stop offset="0%" stop-color="#00e676"/>
        <stop offset="100%" stop-color="#0a5c34"/>
      </linearGradient></defs>
    </svg>
    <span class="brand-name">Hoodwise</span>
  </div>

  <div class="badge"><i></i> Coming Soon</div>

  <h1>Something big<br>is <em>launching.</em></h1>
  <p>Hoodwise App is almost ready. In the meantime, grab the token before it takes off.</p>

  <div class="ca-block">
    <span class="ca-label">CA</span>
    <span class="ca-address">0x0798029054831621ad001611aef2e2125d4a21a8</span>
  </div>

  <a href="https://ape.store/robinhood/0x0798029054831621ad001611aef2e2125d4a21a8" target="_blank" rel="noopener noreferrer" class="btn-buy">
    BUY
    <svg viewBox="0 0 24 24" width="14" height="14"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>

  <div class="back"><a href="/">← Back to Hoodwise</a></div>
</body>
</html>
