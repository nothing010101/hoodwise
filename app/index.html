<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="virtual-protocol-site-verification" content="a6fea4a7f49a539a89cbaa86d7458dba">
<title>Hoodwise — Understand Robinhood Chain</title>
<link rel="icon" href="/hoodwise-mark.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<link rel="stylesheet" href="/styles.css">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Hoodwise">
<meta property="og:title" content="Hoodwise — Your AI guide to Robinhood Chain">
<meta property="og:description" content="Ask clear, source-grounded questions about Robinhood Chain.">
<meta property="og:url" content="https://hoodwise.xyz/app">
<meta property="og:image" content="https://hoodwise.xyz/hoodwise-banner.png">
<meta property="og:image:alt" content="Hoodwise — Your AI guide to Robinhood Chain">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Hoodwise — Your AI guide to Robinhood Chain">
<meta name="twitter:description" content="Ask clear, source-grounded questions about Robinhood Chain.">
<meta name="twitter:image" content="https://hoodwise.xyz/hoodwise-banner.png"></head>
<body>
  <script src="/cursor.js"></script>
  <div class="app" id="app">
    <canvas class="ambient-field" id="ambientField" aria-hidden="true"></canvas>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <a href="/" class="brand-home-link" title="Back to Hoodwise home" data-transition>
          <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true">
            <rect width="100" height="100" rx="24" fill="url(#g1)"/>
            <path d="M28 68 L46 32 L58 52 L72 24" stroke="#06150e" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <defs><linearGradient id="g1" x1="0" y1="0" x2="100" y2="100">
              <stop offset="0%" stop-color="#00e676"/>
              <stop offset="100%" stop-color="#0a5c34"/>
            </linearGradient></defs>
          </svg>
          </a>
          <div>
            <div class="brand-name">Hoodwise</div>
            <div class="brand-tag">Robinhood Chain, explained</div>
          </div>
        </div>
        <button class="icon-btn" id="collapseBtn" title="Collapse sidebar" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New chat
      </button>

      <div class="history-label">History</div>
      <div class="history-list" id="historyList"></div>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <svg id="themeIconMoon" viewBox="0 0 24 24" width="16" height="16"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg id="themeIconSun" viewBox="0 0 24 24" width="16" height="16" style="display:none"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span id="themeLabel">Dark mode</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn mobile-only" id="expandBtn" title="Show history" aria-label="Show history">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="topbar-title">
          <span id="conversationTitle">New chat</span>
        </div>
        <div class="topbar-presence" aria-label="Private browser session"><i></i><span>PRIVATE</span></div>
        <div class="ledger" aria-hidden="true">
          <svg viewBox="0 0 600 40" preserveAspectRatio="none">
            <g class="ledger-track">
              <path d="M0,20 L20,20 L30,8 L45,32 L60,14 L75,26 L90,20 L110,20 L125,6 L140,30 L155,18 L170,24 L190,20 L300,20 L320,8 L335,32 L350,14 L365,26 L380,20 L400,20 L415,6 L430,30 L445,18 L460,24 L480,20 L600,20"/>
              <path d="M0,20 L20,20 L30,8 L45,32 L60,14 L75,26 L90,20 L110,20 L125,6 L140,30 L155,18 L170,24 L190,20 L300,20 L320,8 L335,32 L350,14 L365,26 L380,20 L400,20 L415,6 L430,30 L445,18 L460,24 L480,20 L600,20" transform="translate(600,0)"/>
            </g>
          </svg>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="chips" id="chips">
        <button class="chip" data-q="What is Robinhood Chain in simple terms?">what is it, simply?</button>
        <button class="chip" data-q="What are Stock Tokens and how do they work?">Stock Tokens</button>
        <button class="chip" data-q="Tell me about the memecoin scene on Robinhood Chain">memecoin scene</button>
        <button class="chip" data-q="How is Robinhood Chain different from Base?">vs. Base</button>
        <button class="chip" data-q="What is Robinhood Earn and is it safe?">Robinhood Earn</button>
      </div>

      <form class="inputbar" id="inputForm">
        <textarea class="input" id="input" rows="1" maxlength="4000" aria-describedby="composerMeta" placeholder="Ask anything about Robinhood Chain..."></textarea>
        <button class="send-btn" id="sendBtn" type="submit" aria-label="Send message">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
      <div class="composer-meta" id="composerMeta"><span>Enter to send · Shift + Enter for a new line</span><span id="charCount">0 / 4,000</span></div>
      <div class="disclaimer">Hoodwise explains how Robinhood Chain works. It is not affiliated with Robinhood Markets, and nothing here is financial advice.</div>
    </main>
  </div>

  <div class="hw-page-transition" id="pageTransition"></div>
  <div class="interaction-status" id="interactionStatus" role="status" aria-live="polite"></div>
  <script src="/app.js"></script>
</body>
</html>
